<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajeer Permit Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        .font-ar { font-family: 'Noto Kufi Arabic', sans-serif; }
        .font-en { font-family: 'Inter', sans-serif; }
        .card-shadow { box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04); }
        body { background-color: #f4f7fa; transition: all 0.2s ease; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* ক্যাপচা লেয়ার */
        #verify-overlay {
            position: fixed; inset: 0; background: #f4f7fa;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        #main-site-content { display: none; }

        /* আপনার অরিজাল স্টাইলসমূহ */
        #mobile-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; text-align: center; }
        #mobile-overlay.active { display: flex; }
        @media (max-width: 767px) { 
            .mobile-hide { display: none !important; } 
            .mobile-align { text-align: right !important; }
        }
    </style>
</head>
<body class="text-[#334155] font-ar text-[12px]" id="body-tag">

    <div id="verify-overlay">
        <div class="bg-white p-8 rounded-lg card-shadow text-center max-w-sm w-full mx-4 border border-gray-100">
            <img src="logo.svg" class="h-10 mx-auto mb-6">
            <h2 class="font-bold text-[18px] mb-6 text-[#1e3a8a]">التحقق الأمني</h2>
            <div class="flex justify-center mb-4">
                <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" data-callback="onSuccess"></div>
            </div>
            <p class="text-gray-400 text-[11px]">يرجى إكمال التحقق</p>
        </div>
    </div>

    <div id="main-site-content">
        <header class="bg-white py-3 px-4 md:px-12 border-b border-gray-100">
             <div class="max-w-6xl mx-auto flex justify-between items-center">
                <img src="logo.svg" class="h-7 md:h-11">
                <button onclick="toggleLanguage()" class="font-bold text-[#1e3a8a]">EN/AR</button>
             </div>
        </header>

        <main class="max-w-6xl mx-auto mt-10 px-4">
            <h1 class="text-[20px] font-bold mb-8">تصريح أجير لحلول الموارد البشرية</h1>
            </main>

        <footer class="bg-white border-t border-gray-100 py-10 px-6 md:px-12 mt-20">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col md:flex-row justify-between items-center gap-8">
                    <div class="flex flex-col md:flex-row items-center gap-6">
                        <img src="logo.svg" alt="Ajeer" class="h-10">
                        <div class="flex flex-col md:flex-row gap-4 text-gray-400 text-[12px] text-center md:text-right">
                            <span class="lang-ar">© ٢٠٢٦ / أجير حلول الموارد البشرية. جميع الحقوق محفوظة</span>
                            <span class="lang-en hidden font-en">© 2026 / Ajeer HRS. All rights reserved.</span>
                            <div class="flex gap-4 justify-center">
                                <a href="#" class="hover:text-blue-800 transition"><span class="lang-ar">سياسة الخصوصية</span></a>
                                <a href="#" class="hover:text-blue-800 transition"><span class="lang-ar">شروط الاستخدام</span></a>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all">
                        <img src="vision2030.svg" alt="Vision 2030" class="h-12">
                        <img src="hrsd.svg" alt="HRSD" class="h-10">
                        <img src="qiwa-footer.svg" alt="Qiwa" class="h-6">
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function onSuccess() {
            document.getElementById('verify-overlay').style.display = 'none';
            document.getElementById('main-site-content').style.display = 'block';
        }
        function toggleLanguage() {
            const htmlTag = document.getElementById('main-html');
            const arElements = document.querySelectorAll('.lang-ar');
            const enElements = document.querySelectorAll('.lang-en');
            if (htmlTag.getAttribute('dir') === 'rtl') {
                htmlTag.setAttribute('dir', 'ltr');
                arElements.forEach(el => el.classList.add('hidden'));
                enElements.forEach(el => el.classList.remove('hidden'));
            } else {
                htmlTag.setAttribute('dir', 'rtl');
                enElements.forEach(el => el.classList.add('hidden'));
                arElements.forEach(el => el.classList.remove('hidden'));
            }
        }
    </script>
</body>
</html>
