<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajeer HR Solutions</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #f4f7fa; 
            transition: all 0.2s ease; 
            overflow-x: hidden; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; 
        }
        .font-ar { font-family: 'Noto Kufi Arabic', sans-serif; }
        .font-en { font-family: 'Inter', sans-serif; }
        .card-shadow { box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04); }
        .hidden { display: none !important; }
        
        /* Floating Help Button */
        .help-fab {
            position: fixed; bottom: 25px; z-index: 5000;
            width: 58px; height: 58px; background-color: #1e3a8a;
            border: 4px solid #94a3b8; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        [dir="rtl"] .help-fab { left: 25px; }
        [dir="ltr"] .help-fab { right: 25px; }

        /* Contact Popup */
        #contact-popup {
            position: fixed; bottom: 95px; z-index: 5500;
            width: 360px; max-height: 80vh; background: white;
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: none; flex-direction: column; overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        #contact-popup.active { display: flex !important; }
        [dir="rtl"] #contact-popup { left: 25px; text-align: right; }
        [dir="ltr"] #contact-popup { right: 25px; text-align: left; }

        #mobile-overlay {
            position: fixed; inset: 0; background: white; z-index: 6000;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem;
        }
        #mobile-overlay.active { display: flex; }
    </style>
</head>

<body class="text-[#334155] font-ar text-[12px]" id="body-tag">

    <div id="captcha-box" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff; position: fixed; width: 100%; z-index: 9999; top: 0; left: 0;">
        <div class="g-recaptcha" data-sitekey="6Ldj67osAAAAABW7uAG8MrNg8uaBrJ7Pqm5KvPjq" data-callback="onSuccess"></div>
    </div>

    <div id="full-page-content" style="display: none;">
        
        <div class="help-fab" onclick="toggleContactForm()">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>

        <div id="contact-popup">
            <div style="background: #1e3a8a; color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;">
                <span class="font-bold text-[16px]"><span class="lang-ar">اتصل بنا</span><span class="lang-en hidden font-en">Contact us</span></span>
                <button onclick="toggleContactForm()" class="text-2xl font-bold">—</button>
            </div>
            <div style="padding: 20px; overflow-y: auto;">
                <p class="text-[#475569] mb-5 font-semibold text-[14px]"><span class="lang-ar">كيف يمكننا مساعدتك؟</span><span class="lang-en hidden font-en">How can we help you?</span></p>
                <button class="w-full bg-[#1e3a8a] text-white py-3 rounded-md font-bold text-[15px]">
                    <span class="lang-ar">إرسال</span><span class="lang-en hidden font-en">Send</span>
                </button>
            </div>
        </div>

        <header class="bg-white py-3 px-4 md:px-12 border-b border-gray-100 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center w-full">
                <button onclick="toggleMenu()" class="md:hidden text-[#1e3a8a] text-2xl">☰</button>
                <img src="logo.svg" alt="Logo" class="h-7 md:h-11">
                <div class="hidden md:flex items-center gap-7">
                    <button onclick="toggleLanguage()" class="flex items-center gap-1 font-bold text-[#1e3a8a]">
                        <span class="lang-ar font-en">EN</span><span class="lang-en hidden font-ar">AR</span>
                    </button>
                    <a href="#" class="bg-[#1e3a8a] text-white px-5 py-2.5 rounded-md font-bold text-[13px]">
                        <span class="lang-ar">سجل الآن</span><span class="lang-en hidden font-en">Register now</span>
                    </a>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto mt-6 px-4 mb-10">
            <h1 class="text-[18px] md:text-[22px] font-bold text-[#2d3748] mb-6">
                <span class="lang-ar">تصريح أجير لحلول الموارد البشرية</span>
                <span class="lang-en hidden font-en">Ajeer HRS permit</span>
            </h1>
            <div class="bg-white p-5 rounded-lg card-shadow">
                <p class="font-bold text-[14px]">Iftikhar Ahmed Muhammad Nawaz</p>
             </div>
        </main>

    </div> <script>
        // সিকিউরিটি স্ক্রিপ্ট
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 73))) return false;
        };

        // ক্যাপচা সাকসেস ফাংশন
        window.onSuccess = function(response) {
            if (response.length !== 0) {
                document.getElementById('captcha-box').style.display = 'none';
                document.getElementById('full-page-content').style.display = 'block';
            }
        };

        // ইন্টারফেস ফাংশনসমূহ
        function toggleMenu() { document.getElementById('mobile-overlay').classList.toggle('active'); }
        function toggleContactForm() { document.getElementById('contact-popup').classList.toggle('active'); }
        
        let currentLang = 'ar';
        function toggleLanguage() {
            const htmlTag = document.getElementById('main-html');
            const arElements = document.querySelectorAll('.lang-ar');
            const enElements = document.querySelectorAll('.lang-en');
            
            if (currentLang === 'ar') {
                htmlTag.setAttribute('dir', 'ltr');
                arElements.forEach(el => el.classList.add('hidden'));
                enElements.forEach(el => el.classList.remove('hidden'));
                currentLang = 'en';
            } else {
                htmlTag.setAttribute('dir', 'rtl');
                enElements.forEach(el => el.classList.add('hidden'));
                arElements.forEach(el => el.classList.remove('hidden'));
                currentLang = 'ar';
            }
        }
    </script>
</body>
</html>
