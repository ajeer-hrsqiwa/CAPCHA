<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajeer Permit Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        .font-ar { font-family: 'Noto Kufi Arabic', sans-serif; }
        .font-en { font-family: 'Inter', sans-serif; }
        
        /* প্রাথমিক অবস্থায় পুরো পেজ হাইড থাকবে */
        #main-wrapper { display: none; }
        
        /* ভেরিফিকেশন স্ক্রিন স্টাইল */
        #verification-area {
            position: fixed;
            inset: 0;
            background-color: #f4f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#f4f7fa] text-[#334155] font-ar text-[12px]">

    <div id="verification-area">
        <div class="bg-white p-10 rounded-xl card-shadow border border-gray-50 text-center max-w-sm w-full mx-4">
            <img src="logo.svg" alt="Ajeer" class="h-10 mx-auto mb-6">
            
            <h2 class="font-bold text-[18px] mb-6 text-[#1e3a8a]">
                <span class="lang-ar">التحقق الأمني</span>
                <span class="lang-en hidden font-en">Security Verification</span>
            </h2>

            <div class="flex justify-center mb-6">
                <div class="g-recaptcha" 
                     data-sitekey="6Ldj67osAAAAABW7uAG8MrNg8uaBrJ7Pqm5KvPjq" 
                     data-callback="onSuccess">
                </div>
            </div>

            <p class="text-gray-500 text-[12px] leading-relaxed">
                <span class="lang-ar">يرجى إكمال التحقق للوصول إلى بيانات التصريح</span>
                <span class="lang-en hidden font-en">Complete verification to access permit data.</span>
            </p>
        </div>
    </div>

    <div id="main-wrapper">
        
        <header class="bg-white py-4 px-6 md:px-12 border-b border-gray-100 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <img src="logo.svg" alt="Ajeer" class="h-8 md:h-11">
                <button onclick="toggleLanguage()" class="text-[#1e3a8a] font-bold border border-[#1e3a8a] px-3 py-1 rounded">
                    <span class="lang-ar font-en">EN</span>
                    <span class="lang-en hidden font-ar">AR</span>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto mt-10 px-4 mb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg card-shadow">
                    <h3 class="text-gray-400 text-[11px] mb-2 uppercase">Laborer's Name</h3>
                    <p class="font-bold text-[15px] text-[#1e293b]">Mozibur Rahman Sagor</p>
                </div>
                <div class="bg-white p-6 rounded-lg card-shadow">
                    <h3 class="text-gray-400 text-[11px] mb-2 uppercase">Permit Status</h3>
                    <span class="bg-[#00c07f] text-white px-3 py-1 rounded text-[10px] font-bold">ACTIVE / ساري</span>
                </div>
                <div class="bg-white p-6 rounded-lg card-shadow">
                    <h3 class="text-gray-400 text-[11px] mb-2 uppercase">Expiry Date</h3>
                    <p class="font-bold font-en text-[#1e293b]">2026-05-22</p>
                </div>
            </div>
        </main>

        <footer class="bg-white border-t border-gray-100 py-10 text-center">
            <p class="text-gray-400 text-[11px]">© 2026 Ajeer Human Resources Solutions. All rights reserved.</p>
        </footer>

    </div>

    <script>
        // ম্যাজিক ফাংশন: ভেরিফিকেশন সফল হলে এটি চলবে
        function onSuccess() {
            // ভেরিফিকেশন বক্সটি ভ্যানিশ (Remove) করে দাও
            const verifyArea = document.getElementById('verification-area');
            verifyArea.style.opacity = '0';
            setTimeout(() => {
                verifyArea.style.display = 'none';
                // মূল কন্টেন্ট সামনে নিয়ে এসো
                document.getElementById('main-wrapper').style.display = 'block';
            }, 300);
        }

        // ভাষা পরিবর্তনের ফাংশন
        let currentLang = 'ar';
        function toggleLanguage() {
            const htmlTag = document.getElementById('main-html');
            const arElements = document.querySelectorAll('.lang-ar');
            const enElements = document.querySelectorAll('.lang-en');
            
            if (currentLang === 'ar') {
                htmlTag.setAttribute('dir', 'ltr');
                arElements.forEach(el => el.classList.add('hidden'));
                enElements.forEach(el => el.classList.remove('hidden'));
                currentLang = 'en';
            } else {
                htmlTag.setAttribute('dir', 'rtl');
                enElements.forEach(el => el.classList.add('hidden'));
                arElements.forEach(el => el.classList.remove('hidden'));
                currentLang = 'ar';
            }
        }
    </script>
</body>
</html>
