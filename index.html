<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajeer HR Solutions</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-ar { font-family: 'Noto Kufi Arabic', sans-serif; }
        .font-en { font-family: 'Inter', sans-serif; }
        .card-shadow { box-shadow: 0 2px 15px rgba(0, 0, 0, 0.04); }
        body { background-color: #f4f7fa; transition: all 0.2s ease; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Captcha Modal Styling */
        #captcha-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        /* Mobile Overlay Menu */
        #mobile-overlay {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem;
            text-align: center;
        }
        #mobile-overlay.active { display: flex; }
        .menu-item { font-size: 16px; color: #475569; font-weight: 600; text-decoration: none; }

        @media (max-width: 767px) {
            .mobile-hide { display: none !important; }
            [dir="rtl"] .mobile-align { text-align: right !important; }
            [dir="ltr"] .mobile-align { text-align: left !important; }
            .status-badge { width: fit-content !important; display: inline-block !important; }
            #contact-popup { width: calc(100% - 40px) !important; left: 20px !important; right: 20px !important; bottom: 85px !important; }
        }
        @media (min-width: 768px) {
            .pc-flex { display: flex !important; }
            .mobile-hamburger { display: none !important; }
        }
        .help-fab {
            position: fixed; bottom: 25px; z-index: 3000;
            width: 58px; height: 58px; background-color: #1e3a8a;
            border: 4px solid #94a3b8; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        [dir="rtl"] .help-fab { left: 25px; }
        [dir="ltr"] .help-fab { right: 25px; }

        #contact-popup {
            position: fixed; bottom: 95px; z-index: 3500;
            width: 360px; max-height: 80vh; background: white;
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: none; flex-direction: column; overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        #contact-popup.active { display: flex; }
        [dir="rtl"] #contact-popup { left: 25px; text-align: right; }
        [dir="ltr"] #contact-popup { right: 25px; text-align: left; }

        .form-header { background: #1e3a8a; color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
        .form-body { padding: 20px; font-size: 14px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 6px; color: #1e293b; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; border: 1px solid #cbd5e1; padding: 10px; border-radius: 4px; outline: none;
        }
        .attach-box { border: 1px dashed #cbd5e1; padding: 15px; text-align: center; border-radius: 4px; color: #475569; cursor: pointer; background: #f8fafc; }
    </style>
</head>
<body class="text-[#334155] font-ar text-[12px]" id="body-tag">

    <div id="captcha-overlay">
        <div class="bg-white p-8 rounded-lg shadow-2xl max-w-[380px] w-[95%] text-center">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-full border-4 border-[#3b82f6] flex items-center justify-center text-[#3b82f6] text-3xl font-bold">!</div>
            </div>
            <h2 class="text-[20px] font-bold text-[#2d3748] mb-2">
                <span class="lang-ar">تحقق كابتشا</span>
                <span class="lang-en hidden font-en">Captcha verification</span>
            </h2>
            <p class="text-[#64748b] text-[14px] mb-8">
                <span class="lang-ar">لعرض تفاصيل التصريح، يرجى إكمال تحقق كابتشا</span>
                <span class="lang-en hidden font-en">To view the permit details, complete a captcha verification</span>
            </p>

            <div id="recaptcha-main" class="flex justify-center mb-8" style="min-height: 78px;">
                </div>

            <button onclick="window.location.reload()" class="w-full border border-[#1e3a8a] text-[#1e3a8a] py-3 rounded-md font-bold text-[15px] hover:bg-blue-50 transition">
                <span class="lang-ar">العودة للصفحة الرئيسية</span>
                <span class="lang-en hidden font-en">Go to main page</span>
            </button>
        </div>
    </div>

    <header class="bg-white py-3 px-4 md:px-12 border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center w-full">
            <button onclick="toggleMenu()" class="mobile-hamburger text-[#1e3a8a] text-2xl">☰</button>
            <div class="flex-shrink-0">
                <img src="logo.svg" alt="Ajeer Logo" class="h-7 md:h-11">
            </div>
            <div class="pc-flex hidden items-center gap-7">
                <button onclick="toggleLanguage()" class="flex items-center gap-1 font-bold text-[#1e3a8a]">
                    <span class="lang-ar font-en">EN</span><span class="lang-en hidden font-ar">AR</span>
                </button>
                <a href="#" class="bg-[#1e3a8a] text-white px-5 py-2.5 rounded-md font-bold text-[13px]">
                    <span class="lang-ar">سجل الآن</span><span class="lang-en hidden font-en">Register now</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto mt-6 px-4">
        <h1 class="text-[22px] font-bold text-[#2d3748] mb-10 mobile-align">
            <span class="lang-ar">تصريح أجير لحلول الموارد البشرية</span>
            <span class="lang-en hidden font-en">Ajeer HRS permit</span>
        </h1>
        </main>

    <script>
        let currentLang = 'ar';

        function loadCaptcha(lang) {
            // Container clear
            document.getElementById('recaptcha-main').innerHTML = '';
            
            // Remove previous script
            const oldScript = document.getElementById('recaptcha-script');
            if (oldScript) oldScript.remove();

            // Load new script with explicit language
            const script = document.createElement('script');
            script.id = 'recaptcha-script';
            script.src = `https://www.google.com/recaptcha/api.js?hl=${lang}&render=explicit`;
            script.async = true;
            script.defer = true;
            
            script.onload = () => {
                grecaptcha.ready(function() {
                    grecaptcha.render('recaptcha-main', {
                        'sitekey': 'আপনার_সাইট_কী_এখানে_দিন', // <--- এখানে আপনার সাইট কী বসান
                        'callback': function(response) {
                            if(response) {
                                document.getElementById('captcha-overlay').classList.add('hidden');
                            }
                        }
                    });
                });
            };
            document.head.appendChild(script);
        }

        function toggleLanguage() {
            const htmlTag = document.getElementById('main-html');
            const bodyTag = document.getElementById('body-tag');
            const arElements = document.querySelectorAll('.lang-ar');
            const enElements = document.querySelectorAll('.lang-en');
            
            if (currentLang === 'ar') {
                htmlTag.setAttribute('dir', 'ltr');
                bodyTag.classList.replace('font-ar', 'font-en');
                arElements.forEach(el => el.classList.add('hidden'));
                enElements.forEach(el => el.classList.remove('hidden'));
                currentLang = 'en';
            } else {
                htmlTag.setAttribute('dir', 'rtl');
                bodyTag.classList.replace('font-en', 'font-ar');
                enElements.forEach(el => el.classList.add('hidden'));
                arElements.forEach(el => el.classList.remove('hidden'));
                currentLang = 'ar';
            }
            loadCaptcha(currentLang);
        }

        function toggleMenu() { document.getElementById('mobile-overlay')?.classList.toggle('active'); }

        window.onload = () => {
            loadCaptcha(currentLang);
        };
    </script>
</body>
</html>
